<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타일 3 - 볼드하고 드라마틱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    max-width: 540px;
    width: 100%;
    padding: 50px 40px;
  }
  .accent { color: #C9A96E; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 20px; display: block; }
  h1 { font-size: 32px; color: #ffffff; font-weight: normal; line-height: 1.3; margin-bottom: 10px; }
  .line { width: 50px; height: 2px; background: #C9A96E; margin: 20px 0 35px; }
  .options { display: flex; flex-direction: column; gap: 0; }
  .option {
    border-top: 1px solid #222;
    padding: 20px 0;
    cursor: pointer;
    font-size: 16px;
    color: #888;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 15px;
  }
  .option:last-child { border-bottom: 1px solid #222; }
  .option:hover { color: #C9A96E; padding-left: 10px; }
  .num { font-size: 11px; color: #444; width: 20px; flex-shrink: 0; }
  .progress {
    display: flex;
    gap: 4px;
    margin-bottom: 40px;
  }
  .seg { height: 2px; flex: 1; background: #222; }
  .seg.done { background: #C9A96E; }
  .style-tag {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #C9A96E;
    color: #0a0a0a;
    padding: 8px 16px;
    font-size: 12px;
    letter-spacing: 1px;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<div class="style-tag">스타일 3: 볼드 & 드라마틱</div>
<div class="card">
  <div class="progress">
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg"></div>
    <div class="seg"></div>
    <div class="seg"></div>
  </div>
  <span class="accent">Coffee Personality Quiz</span>
  <h1>넷플릭스 마라톤을 한다면?</h1>
  <div class="line"></div>
  <div class="options">
    <div class="option"><span class="num">01</span> 긴장감 넘치는 액션 시리즈</div>
    <div class="option"><span class="num">02</span> 따뜻한 로맨틱 코미디</div>
    <div class="option"><span class="num">03</span> 잔잔한 자연 다큐멘터리</div>
    <div class="option"><span class="num">04</span> 일단 뭐든 틀고 딴짓하기</div>
  </div>
</div>
</body>
</html>
