version: '3.9'
services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - DATABASE_URL=file:./dev.db
      - NEXTAUTH_SECRET=pixel-chibi-game-secret-key-2024
      - NEXTAUTH_URL=http://localhost:3000
    command: npm run dev
