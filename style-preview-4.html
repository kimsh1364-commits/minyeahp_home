<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스타일 4 - 따뜻하고 아늑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: #F5EFE6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #FFFDF9;
    border-radius: 20px;
    padding: 45px 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(139, 90, 43, 0.12);
    border: 1px solid #EDE0CC;
  }
  .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .logo { font-size: 13px; color: #8B5A2B; letter-spacing: 2px; text-transform: uppercase; }
  .step { font-size: 12px; color: #C4A882; }
  .progress-bar { width: 100%; height: 4px; background: #EDE0CC; border-radius: 4px; margin-bottom: 30px; }
  .progress-fill { width: 50%; height: 100%; background: linear-gradient(90deg, #C4813A, #8B5A2B); border-radius: 4px; }
  h1 { font-size: 21px; color: #3D2B1F; font-weight: normal; line-height: 1.5; margin-bottom: 25px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: #FAF5EE;
    border: 1.5px solid #EDE0CC;
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    font-size: 15px;
    color: #5C3D2E;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover { background: #FFF8F0; border-color: #C4813A; color: #3D2B1F; }
  .dot { width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #C4A882; flex-shrink: 0; }
  .option:hover .dot { background: #C4813A; border-color: #C4813A; }
  .style-tag {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #8B5A2B;
    color: #FAF5EE;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-family: sans-serif;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="style-tag">스타일 4: 따뜻 & 아늑</div>
<div class="card">
  <div class="top">
    <span class="logo">☕ Basecamp</span>
    <span class="step">3 / 6</span>
  </div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
  <h1>넷플릭스 마라톤을 한다면?</h1>
  <div class="options">
    <div class="option"><div class="dot"></div> 긴장감 넘치는 액션 시리즈</div>
    <div class="option"><div class="dot"></div> 따뜻한 로맨틱 코미디</div>
    <div class="option"><div class="dot"></div> 잔잔한 자연 다큐멘터리</div>
    <div class="option"><div class="dot"></div> 일단 뭐든 틀고 딴짓하기</div>
  </div>
</div>
</body>
</html>
